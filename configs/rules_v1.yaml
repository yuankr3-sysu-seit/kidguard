# 规则引擎参数配置
rules:
  # 距离阈值（归一化肩宽单位）
  tau_dist: 2.0
  
  # 接近窗口帧数
  W: 2
  
  # 分离重置帧数
  R: 15
  
  # 物理特征阈值
  tau_v: 0.6757      # 相对接近速度阈值
  tau_a: 0.4240      # 肢体加速度阈值
  tau_alpha: 0.3     # 关节角加速度阈值
  tau_phi: 14.9127   # 躯干倾角变化阈值
  tau_p: 0.9848      # 骨盆速度阈值
  
  # 置信度抑制阈值
  tau_c: 0.5723
  
  # 报警阈值
  alert_threshold: 0.3136
  
  # 平滑窗口大小
  M: 5
  
  # 反瞬移阈值
  tau_teleport: 0.95
  
  # 事件确认时间窗
  confirm_window: 5
  min_confirm_frames: 3
  
  # 特征波动性阈值（用于区分冲突和拥抱）
  # 低于此值可能表示平稳互动（如拥抱），会降低得分
  tau_volatility: 0.1
