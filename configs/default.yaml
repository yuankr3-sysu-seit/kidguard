dataset:
  ntu_conflict_actions: [49, 50, 51]
  # 将单人动作改为双人正常互动动作（如拥抱、握手、拍背等）
  ntu_normal_actions: [52, 53, 54, 55, 56, 57, 58, 59, 60]

output:
  save_events_csv: true
  save_events_json: false
  save_metrics_csv: true
  visualization_enabled: false
paths:
  output_events_dir: outputs/events
  output_metrics_dir: outputs/metrics
  skeleton_data_dir: data/skeleton
  video_data_dir: data/video
rules:
  alert_threshold: 0.3
  conflict_duration_frames: 8
  proximity_threshold: 0.5
  proximity_window_frames: 5
  smoothing_window_frames: 5
  teacher_presence_threshold: 0.5
  velocity_threshold: 0.05
  wrist_intrusion_threshold: 0.15
  # 置信度抑制阈值（支持 Optuna 调参）
  tau_c: 0.5
  # ByteTrack 追踪器配置（在 video_source.py 中使用）
  tracker: "bytetrack.yaml"
  tracker_conf: 0.2
skeleton:
  keypoint_names:
  - nose
  - left_eye
  - right_eye
  - left_ear
  - right_ear
  - left_shoulder
  - right_shoulder
  - left_elbow
  - right_elbow
  - left_wrist
  - right_wrist
  - left_hip
  - right_hip
  - left_knee
  - right_knee
  - left_ankle
  - right_ankle
  standard: COCO-17
state_machine:
  approach_frames: 5
  conflict_frames: 8
  contact_frames: 3
  enabled: false
  resolve_frames: 10
  states:
  - NORMAL
  - APPROACHING
  - CONTACT
  - CONFLICT
  - RESOLVED
